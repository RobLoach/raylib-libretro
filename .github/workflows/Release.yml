name: Release

on:
  release:
    types: [published]

# Allow the default GITHUB_TOKEN to attach assets to the release.
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libglu1-mesa-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-linux-amd64.zip .
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-linux-amd64.zip
          fail_on_unmatched_files: true

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libglu1-mesa-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-linux-arm64.zip .
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-linux-arm64.zip
          fail_on_unmatched_files: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Install
        run: cmake --install build --config Release
      - name: Package
        run: Compress-Archive -Path install\* -DestinationPath raylib-libretro-${{ github.ref_name }}-windows-amd64.zip
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-windows-amd64.zip
          fail_on_unmatched_files: true

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Install
        run: cmake --install build --config Release
      - name: Package
        run: Compress-Archive -Path install\* -DestinationPath raylib-libretro-${{ github.ref_name }}-windows-arm64.zip
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-windows-arm64.zip
          fail_on_unmatched_files: true

  build-linux-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=armv7 \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DPLATFORM=DRM
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-linux-armv7.zip .
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-linux-armv7.zip
          fail_on_unmatched_files: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-macos-arm64.zip .
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-macos-arm64.zip
          fail_on_unmatched_files: true

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-macos-x86_64.zip .
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-macos-x86_64.zip
          fail_on_unmatched_files: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1" "ndk;27.3.13750724"
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> android/local.properties
      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin
      - name: Build APK
        working-directory: android
        env:
          TAG: ${{ github.event.release.tag_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleRelease -PappVersionName="${TAG#v}" -PappVersionCode="$RUN_NUMBER"
      # The action names the asset after the file, so rename to the release name.
      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk raylib-libretro-${{ github.ref_name }}-android-arm64.apk
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-android-arm64.apk
          fail_on_unmatched_files: true

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
      - name: Configure
        run: emcmake cmake -B build -DPLATFORM=Web -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install
      - name: Build
        run: cmake --build build --parallel
      - name: Install
        run: cmake --install build
      - name: Stamp service worker version
        run: sed -i "s/__VERSION__/${{ github.ref_name }}/g" install/sw.js
      - name: Package
        run: |
          cd install
          zip -r ../raylib-libretro-${{ github.ref_name }}-web-wasm32.zip .
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: raylib-libretro-${{ github.ref_name }}-web-wasm32.zip
          fail_on_unmatched_files: true
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./install
