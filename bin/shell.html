<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>raylib-libretro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">

    <!-- Progressive Web App: installable + standalone "Add to Home Screen" -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="shortcut icon" href="https://www.raylib.com/favicon.ico">
    <!-- iOS standalone web app -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="libretro">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        background-color: black;
        overflow: hidden;
        overscroll-behavior: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas.emscripten {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        border: 0;
        background-color: black;
        outline: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
<canvas class="emscripten" id="canvas" width="1024" height="768" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script>
// Prevent the browser from intercepting drag-and-drop so the dropped
      // file reaches the canvas listener installed by emscripten/GLFW.
      ['dragenter', 'dragover', 'drop'].forEach(function (type) {
        window.addEventListener(type, function (e) { e.preventDefault(); }, false);
      });

      // Parse ?game= and ?core= query parameters to auto-load URLs on startup.
      var _urlParams = new URLSearchParams(window.location.search);

      // Handle fullscreen key directly in JS — requestFullscreen() must be
      // called from a user-gesture event handler, not the rAF-driven C loop.
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F11') {
          e.preventDefault();
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(){});
          } else {
            document.exitFullscreen();
          }
        }
      });

      var Module = {
        // Polyfill for raylib's ToggleFullscreen(), which calls
        // Module.requestFullscreen(lockPointer, resizeCanvas) via EM_ASM.
        // Newer Emscripten no longer exposes this on Module.
        requestFullscreen: function(lockPointer, resizeCanvas) {
          var el = document.documentElement;
          if (el.requestFullscreen) el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        },
        print: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.log(text);
        },
        printErr: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.error(text);
        },
        canvas: (function () {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener('webglcontextlost', function (e) {
            alert('WebGL context lost. Please reload the page.');
            e.preventDefault();
          }, false);
          return canvas;
        })(),
        // Persist /userdata to IndexedDB so raylib-libretro.cfg, battery saves
        // and BIOS files survive page reloads. main() is deferred via the
        // run-dependency mechanism until the initial syncfs(true) completes.
        preRun: [function () {
          // Ask the browser not to evict our IndexedDB under storage
          // pressure. Firefox in particular treats IDB as "best-effort"
          // unless explicitly marked persistent. No-op on browsers without
          // the Storage API; doesn't prompt the user.
          if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function (granted) {
              if (!granted) console.warn('Persistent storage was not granted; saves may be evicted.');
            });
          }

          addRunDependency('idbfs-load');
          try { FS.mkdir('/userdata'); } catch (e) {}
          FS.mount(IDBFS, {}, '/userdata');
          FS.syncfs(true, function (err) {
            if (err) console.error('IDBFS load failed:', err);
            try { FS.mkdir('/userdata/saves'); }  catch (e) {}
            try { FS.mkdir('/userdata/system'); } catch (e) {}
            removeRunDependency('idbfs-load');
          });
        }, function () {
          // ?core=<url> is downloaded synchronously (blocks main() via a
          // run-dependency and is passed in argv). ?game=<url> is fetched in
          // the background and handed to LoadLibretroGameFromJS once main()
          // is running — see postRun below. This lets the UI come up while a
          // large ROM is still downloading.
          function fetchToFS(url) {
            var filename = url.split('/').pop().split('?')[0] || 'download';
            var destPath = '/downloads/' + filename;
            try { FS.mkdir('/downloads'); } catch (e) {}
            return fetch(url)
              .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + url);
                return r.arrayBuffer();
              })
              .then(function (buf) {
                FS.writeFile(destPath, new Uint8Array(buf));
                console.log('URL loaded to ' + destPath);
                return destPath;
              });
          }

          function logFetchError(label, err) {
            console.error('Failed to load ' + label + ': ' + err +
              ' (if this is a TypeError, check that the server sends Access-Control-Allow-Origin)');
          }

          var coreUrl = _urlParams.get('core');
          if (coreUrl) {
            addRunDependency('url-core');
            var coreFilename = coreUrl.split('/').pop().split('?')[0] || 'url-core';
            Module.arguments = (Module.arguments || []).concat(['-L', '/downloads/' + coreFilename]);
            fetchToFS(coreUrl)
              .catch(function (err) { logFetchError('core', err); })
              .finally(function () { removeRunDependency('url-core'); });
          }

          var gameUrl = _urlParams.get('game');
          if (gameUrl) {
            Module._pendingGameFetch = fetchToFS(gameUrl)
              .catch(function (err) { logFetchError('game', err); return null; });
          }
        }],
        postRun: [function () {
          // Hand off any background ?game= download to the running app.
          // LoadLibretroGameFromJS picks LoadLibretroGameFromPhysFS (when a core
          // was loaded via ?core=) or MenuLoadGame (autodetects from ROM
          // extension, same as drag-and-drop).
          if (Module._pendingGameFetch) {
            Module._pendingGameFetch.then(function (destPath) {
              if (!destPath) return;
              var ok = Module.ccall('LoadLibretroGameFromJS', 'number', ['string'], [destPath]);
              if (!ok) console.error('LoadLibretroGameFromJS failed for ' + destPath);
            });
            Module._pendingGameFetch = null;
          }
        }, function () {
          // Safety-net flush. Commit points in C (SaveLibretroAllSettings,
          // save-state writes) now sync IDBFS themselves, so this mostly
          // covers writes that don't go through those paths — notably SRAM
          // written by cores directly. Also pulls any uncommitted widget
          // state into cfg before syncing.
          //
          // Guard against double-flush: pagehide and visibilitychange both
          // fire on tab close in most browsers. Without this, a slow IDBFS
          // commit can overlap itself.
          var _flushInFlight = false;
          function flushPersistence() {
            if (_flushInFlight) return;
            _flushInFlight = true;
            try {
              if (Module && Module._SaveLibretroAllSettings) {
                Module._SaveLibretroAllSettings();
              }
            } catch (e) { console.error('flushPersistence: save failed:', e); }
            FS.syncfs(false, function (err) {
              if (err) console.error('IDBFS sync failed:', err);
              _flushInFlight = false;
            });
          }

          // Periodic safety-net flush. Once a minute is plenty: pagehide /
          // visibilitychange already cover tab close and app-switch, and
          // menu commits go through their own SaveLibretroAllSettings path
          // on Back navigation.
          setInterval(flushPersistence, 60000);

          // Catch the user closing the tab / reloading / switching apps
          // mid-edit, before the in-memory cfg has been committed to disk.
          // pagehide is the most reliable on mobile and Safari; the
          // visibilitychange handler covers desktop browsers where pagehide
          // sometimes lags.
          window.addEventListener('pagehide', flushPersistence);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'hidden') flushPersistence();
          });
        }]
      };

      // Register the service worker so the app is installable and works
      // offline. Registered relative to this page so it works under any
      // deploy path (e.g. GitHub Pages project subpath). Failures are
      // non-fatal — the app runs fine without it.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
