<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>raylib-libretro</title>
    <meta name="description" content="A libretro frontend built with raylib — play retro games in your browser.">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <!-- Render UA surfaces (scrollbars, the pre-paint frame) dark to match the
         #11111b backdrop and avoid a white flash on first navigation. -->
    <meta name="color-scheme" content="dark">

    <!-- Progressive Web App: installable + standalone "Add to Home Screen".
         theme-color matches the page/canvas backdrop (and the manifest) so the
         browser chrome and PWA splash are seamless with the app. -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#11111b">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <!-- iOS standalone web app -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="libretro">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        background-color: #11111b;
        overflow: hidden;
        overscroll-behavior: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas.emscripten {
        display: block;
        /* Fill the viewport as a pre-JS default; applyCanvasResize() below sets
           exact inline pixel sizes once the runtime is up. The backing store is
           sized to physical pixels (CSS size × devicePixelRatio), so the canvas
           renders 1:1 with the device and needs no image-rendering hint. */
        width: 100%;
        height: 100%;
        border: 0;
        background-color: #11111b;
        outline: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Loading / error overlay — see #loading in the body. Shown by default
         (display:flex) so it covers the black canvas before the runtime is up;
         hidden from JS once the app starts, or pinned red on a fatal error. */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        box-sizing: border-box;
        background-color: #11111b;
        color: #f5e0dc;
        font: 14px/1.4 system-ui, -apple-system, sans-serif;
        text-align: center;
        -webkit-user-select: none;
        user-select: none;
      }
      #loading .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #333;
        border-top-color: #bbb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #loading.error .spinner { display: none; }
      #loading.error #loading-text { color: #a6e3a1; white-space: pre-line; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <canvas class="emscripten" id="canvas" width="1024" height="768" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <!-- Loading / error overlay. The page and canvas are both black, so this is
         the only feedback during the wasm + core preload, the initial IDBFS
         sync and any ?core=/?game= download — and the only place fatal errors
         (which otherwise reach the console alone) become visible. JS updates
         the loading text and pins errors; postRun hides the overlay. -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>
    <noscript>
      <!-- Without this the pure-CSS spinner above would animate forever. -->
      <style>#loading { display: none; }</style>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#f5e0dc;font:14px/1.4 system-ui,-apple-system,sans-serif;text-align:center;padding:24px">
        This app needs JavaScript and WebGL to run.
      </div>
    </noscript>

    <script>
      // --- Loading / error overlay ------------------------------------------
      // Drives the #loading element in the body. setOverlay() shows progress
      // text; showOverlayError() pins a red, un-hideable message so a fatal
      // error survives any later progress/hide call. Hidden once, in postRun.
      var _overlay       = document.getElementById('loading');
      var _overlayText   = document.getElementById('loading-text');
      var _overlayFailed = false;
      function setOverlay(msg, isError) {
        if (!_overlay) return;
        if (_overlayFailed && !isError) return; // a fatal error stays pinned
        if (isError) _overlayFailed = true;
        if (msg) {
          _overlayText.textContent = msg;
          _overlay.classList.toggle('error', !!isError);
          _overlay.style.display = 'flex';
        } else {
          _overlay.style.display = 'none';
        }
      }
      function showOverlayError(msg) {
        console.error(msg);
        setOverlay(msg, true);
      }

      // Track every AudioContext the app creates so the first user gesture can
      // resume it. iOS Safari and Chrome's autoplay policy start audio contexts
      // suspended, so the emulator is silent until the user interacts. We wrap
      // the constructor (rather than poke raylib/miniaudio internals) before the
      // WASM module runs, so it's version-independent and catches every context.
      var _audioContexts = [];
      ['AudioContext', 'webkitAudioContext'].forEach(function (name) {
        var Orig = window[name];
        if (!Orig) return;
        window[name] = new Proxy(Orig, {
          construct: function (target, ctorArgs) {
            var ctx = Reflect.construct(target, ctorArgs, target);
            _audioContexts.push(ctx);
            return ctx;
          }
        });
      });

      // Prevent the browser from intercepting drag-and-drop so the dropped
      // file reaches the canvas listener installed by emscripten/GLFW.
      ['dragenter', 'dragover', 'drop'].forEach(function (type) {
        window.addEventListener(type, function (e) { e.preventDefault(); }, false);
      });

      // Parse ?game= and ?core= query parameters to auto-load URLs on startup.
      var _urlParams = new URLSearchParams(window.location.search);

      // Handle fullscreen key directly in JS — requestFullscreen() must be
      // called from a user-gesture event handler, not the rAF-driven C loop.
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F11') {
          e.preventDefault();
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(function(){});
          } else {
            document.exitFullscreen();
          }
        }
      });

      // Cap the backing-store scale: phones report devicePixelRatio 2-3, and a
      // full-viewport framebuffer (plus any post-process shader) at 3x costs ~9x
      // the fill rate of 1x — enough to drop framerate and drain battery. 2x is
      // still crisp on mobile.
      var MAX_PIXEL_RATIO = 2;

      // HiDPI canvas sizing. raylib's web backend sizes the canvas backing store
      // to window.innerWidth/innerHeight in CSS pixels (devicePixelRatio is
      // ignored), so on Retina / fractional-scaling displays the frame is
      // rendered at a low resolution and upscaled — the "weird scaling". We
      // display the canvas at the CSS viewport size but set its backing store to
      // (capped) physical pixels via ResizeCanvasFromJS (-> SetWindowSize), so the
      // WebGL framebuffer and GetScreenWidth/Height match the device.
      function applyCanvasResize() {
        var canvas = Module.canvas;
        if (!canvas) return;
        var dpr  = Math.min(window.devicePixelRatio || 1, MAX_PIXEL_RATIO);
        var cssW = window.innerWidth, cssH = window.innerHeight;
        // Display at CSS size (correct on-screen size).
        canvas.style.width  = cssW + 'px';
        canvas.style.height = cssH + 'px';
        // Backing store at physical px -> crisp GL framebuffer.
        var pxW = Math.round(cssW * dpr), pxH = Math.round(cssH * dpr);
        if (Module.calledRun && Module.ccall) {
          Module.ccall('ResizeCanvasFromJS', null, ['number', 'number'], [pxW, pxH]);
        }
      }
      // raylib's built-in resize callback also fires on 'resize' and would reset
      // the backing store to CSS pixels; re-applying on requestAnimationFrame
      // makes ours run last within the frame (and coalesces resize bursts).
      var _resizeQueued = false;
      function queueCanvasResize() {
        if (_resizeQueued) return;
        _resizeQueued = true;
        requestAnimationFrame(function () { _resizeQueued = false; applyCanvasResize(); });
      }
      window.addEventListener('resize', queueCanvasResize);
      window.addEventListener('orientationchange', queueCanvasResize);

      // Screen Wake Lock: keep the phone from dimming/locking mid-game. The lock
      // is released by the browser when the tab is hidden, so re-acquire it when
      // the page becomes visible again. Non-fatal where unsupported.
      var _wakeLock = null;
      function requestWakeLock() {
        if (!('wakeLock' in navigator) || _wakeLock) return;
        navigator.wakeLock.request('screen').then(function (lock) {
          _wakeLock = lock;
          lock.addEventListener('release', function () { _wakeLock = null; });
        }).catch(function () { /* denied or not visible; ignore */ });
      }

      // First user gesture: resume any suspended audio context and grab the wake
      // lock (both require a gesture on mobile). Runs once, then detaches.
      function onFirstGesture() {
        _audioContexts.forEach(function (ctx) {
          if (ctx && ctx.state === 'suspended' && ctx.resume) ctx.resume().catch(function () {});
        });
        requestWakeLock();
        ['pointerdown', 'touchend', 'keydown'].forEach(function (type) {
          window.removeEventListener(type, onFirstGesture);
        });
      }
      ['pointerdown', 'touchend', 'keydown'].forEach(function (type) {
        window.addEventListener(type, onFirstGesture, { passive: true });
      });
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') requestWakeLock();
      });

      var Module = {
        totalDependencies: 0,
        // Surface startup progress and fatal errors on the overlay; without
        // these the user sees only black until the first frame renders.
        setStatus: function (text) {
          if (_overlayFailed || !text) return; // overlay is hidden in postRun
          // Emscripten reports byte progress as "msg (x/y)" — show a percentage.
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          if (m && +m[4] > 0) text = m[1].trim() + ' (' + Math.round(100 * m[2] / m[4]) + '%)';
          setOverlay(text);
        },
        monitorRunDependencies: function (left) {
          if (_overlayFailed) return;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left > 0) {
            setOverlay('Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')');
          }
        },
        onAbort: function (what) {
          showOverlayError('Failed to start.\n' + (what || '') + '\nPlease reload the page.');
        },
        // Polyfill for raylib's ToggleFullscreen(), which calls
        // Module.requestFullscreen(lockPointer, resizeCanvas) via EM_ASM.
        // Newer Emscripten no longer exposes this on Module.
        requestFullscreen: function(lockPointer, resizeCanvas) {
          var el = document.documentElement;
          if (el.requestFullscreen) el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        },
        print: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.log(text);
        },
        printErr: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
          console.error(text);
        },
        canvas: (function () {
          var canvas = document.getElementById('canvas');
          // Non-blocking overlay instead of alert(). raylib's web backend
          // doesn't recreate GL resources on restore, so a reload is the
          // reliable recovery; preventDefault keeps the browser from giving up
          // on the context outright in case the user doesn't reload.
          canvas.addEventListener('webglcontextlost', function (e) {
            e.preventDefault();
            showOverlayError('The graphics context was lost.\nPlease reload the page.');
          }, false);
          return canvas;
        })(),
        // Persist /userdata to IndexedDB so raylib-libretro.cfg, battery saves
        // and BIOS files survive page reloads. main() is deferred via the
        // run-dependency mechanism until the initial syncfs(true) completes.
        preRun: [function () {
          // Ask the browser not to evict our IndexedDB under storage
          // pressure. Firefox in particular treats IDB as "best-effort"
          // unless explicitly marked persistent. No-op on browsers without
          // the Storage API; doesn't prompt the user.
          if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(function (granted) {
              if (!granted) console.warn('Persistent storage was not granted; saves may be evicted.');
            });
          }

          addRunDependency('idbfs-load');
          try { FS.mkdir('/userdata'); } catch (e) {}
          FS.mount(IDBFS, {}, '/userdata');
          FS.syncfs(true, function (err) {
            if (err) console.error('IDBFS load failed:', err);
            try { FS.mkdir('/userdata/saves'); }  catch (e) {}
            try { FS.mkdir('/userdata/system'); } catch (e) {}
            removeRunDependency('idbfs-load');
          });
        }, function () {
          // ?core=<url> is downloaded synchronously (blocks main() via a
          // run-dependency and is passed in argv). ?game=<url> is fetched in
          // the background and handed to LoadLibretroGameFromJS once main()
          // is running — see postRun below. This lets the UI come up while a
          // large ROM is still downloading.

          // Map a URL to the /downloads path it will be written to. Shared by
          // fetchToFS and the ?core= block below, which has to build the core's
          // -L argv synchronously (before the fetch resolves) — deriving the
          // name in one place keeps the write path and the argv path identical.
          function fsPathForUrl(url) {
            return '/downloads/' + (url.split('/').pop().split('?')[0] || 'download');
          }

          function fetchToFS(url) {
            var destPath = fsPathForUrl(url);
            try { FS.mkdir('/downloads'); } catch (e) {}
            return fetch(url)
              .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + url);
                return r.arrayBuffer();
              })
              .then(function (buf) {
                FS.writeFile(destPath, new Uint8Array(buf));
                console.log('URL loaded to ' + destPath);
                return destPath;
              });
          }

          function logFetchError(label, err) {
            console.error('Failed to load ' + label + ': ' + err +
              ' (if this is a TypeError, check that the server sends Access-Control-Allow-Origin)');
          }

          // SECURITY: ?core=<url> downloads and runs a libretro core — native
          // code executing in this page's context. A crafted link can therefore
          // make a visitor's browser run an attacker-chosen core. Cross-origin
          // fetches are gated by the remote server's CORS policy, but that is
          // the *only* barrier (any host sending Access-Control-Allow-Origin
          // qualifies), so treat an external ?core= as untrusted. Games (?game=)
          // are data, not code, and don't carry this risk. We don't hard-block
          // cross-origin cores (loading from a CDN is a legitimate use), but we
          // warn so it's visible in the console.
          var coreUrl = _urlParams.get('core');
          if (coreUrl) {
            if (new URL(coreUrl, window.location.href).origin !== window.location.origin) {
              console.warn('Loading a libretro core (executable code) from a different origin: ' + coreUrl);
            }
            addRunDependency('url-core');
            Module.arguments = (Module.arguments || []).concat(['-L', fsPathForUrl(coreUrl)]);
            fetchToFS(coreUrl)
              .catch(function (err) {
                logFetchError('core', err);
                // The user explicitly requested this core; without it the
                // session can't run, so pin the error rather than starting black.
                showOverlayError('Could not load the requested core.\n' + err);
              })
              .finally(function () { removeRunDependency('url-core'); });
          }

          var gameUrl = _urlParams.get('game');
          if (gameUrl) {
            Module._pendingGameFetch = fetchToFS(gameUrl)
              .catch(function (err) { logFetchError('game', err); return null; });
          }
        }],
        postRun: [function () {
          // Runtime is up and every run-dependency (wasm, core preload, IDBFS
          // load, ?core= download) has resolved — hide the loading overlay.
          setOverlay('');
        }, function () {
          // Size the canvas backing store to physical pixels now that the
          // runtime (and ResizeCanvasFromJS) is available, so the first visible
          // frame is already at device resolution.
          queueCanvasResize();
        }, function () {
          // Hand off any background ?game= download to the running app.
          // LoadLibretroGameFromJS picks LoadLibretroGameFromPhysFS (when a core
          // was loaded via ?core=) or MenuLoadGame (autodetects from ROM
          // extension, same as drag-and-drop).
          if (Module._pendingGameFetch) {
            Module._pendingGameFetch.then(function (destPath) {
              if (!destPath) return;
              var ok = Module.ccall('LoadLibretroGameFromJS', 'number', ['string'], [destPath]);
              if (!ok) console.error('LoadLibretroGameFromJS failed for ' + destPath);
            });
            Module._pendingGameFetch = null;
          }
        }, function () {
          // Safety-net flush. Commit points in C (SaveLibretroAllSettings,
          // save-state writes) now sync IDBFS themselves, so this mostly
          // covers writes that don't go through those paths — notably SRAM
          // written by cores directly. Also pulls any uncommitted widget
          // state into cfg before syncing.
          //
          // Guard against double-flush: pagehide and visibilitychange both
          // fire on tab close in most browsers. Without this, a slow IDBFS
          // commit can overlap itself.
          var _flushInFlight = false;
          function flushPersistence() {
            if (_flushInFlight) return;
            _flushInFlight = true;
            try {
              // _SaveLibretroAllSettings is reachable because the web build
              // links with -sMAIN_MODULE=1, which exports all symbols. If that
              // ever becomes MAIN_MODULE=2, add SaveLibretroAllSettings to
              // EXPORTED_FUNCTIONS or this safety-net flush silently no-ops.
              if (Module && Module._SaveLibretroAllSettings) {
                Module._SaveLibretroAllSettings();
              }
            } catch (e) { console.error('flushPersistence: save failed:', e); }
            try {
              FS.syncfs(false, function (err) {
                if (err) console.error('IDBFS sync failed:', err);
                _flushInFlight = false;
              });
            } catch (e) {
              // A synchronous throw would otherwise leave _flushInFlight pinned
              // true and silently disable every later flush — reset it.
              console.error('flushPersistence: syncfs failed:', e);
              _flushInFlight = false;
            }
          }

          // Periodic safety-net flush. Once a minute is plenty: pagehide /
          // visibilitychange already cover tab close and app-switch, and
          // menu commits go through their own SaveLibretroAllSettings path
          // on Back navigation.
          setInterval(flushPersistence, 60000);

          // Catch the user closing the tab / reloading / switching apps
          // mid-edit, before the in-memory cfg has been committed to disk.
          // pagehide is the most reliable on mobile and Safari; the
          // visibilitychange handler covers desktop browsers where pagehide
          // sometimes lags.
          window.addEventListener('pagehide', flushPersistence);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'hidden') flushPersistence();
          });
        }]
      };

      // Register the service worker so the app is installable and works
      // offline. Registered relative to this page so it works under any
      // deploy path (e.g. GitHub Pages project subpath). Failures are
      // non-fatal — the app runs fine without it.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
