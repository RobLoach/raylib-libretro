plugins {
    id 'com.android.application'
}

android {
    namespace 'com.raylib.libretro'
    compileSdk 34
    ndkPath System.getenv('ANDROID_NDK_HOME')

    defaultConfig {
        applicationId 'com.raylib.libretro'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '0.0.8'

        externalNativeBuild {
            cmake {
                abiFilters 'arm64-v8a'
                arguments '-DANDROID_STL=c++_shared'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'CMakeLists.txt'
            version '3.22.1'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
}
